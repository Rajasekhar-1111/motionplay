services:
  - type: web
    name: subway-surfers-gesture
    env: python
    region: oregon
    plan: free
    pythonVersion: 3.11.8
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: RENDERENV
        value: production
